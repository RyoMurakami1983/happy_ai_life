name: Quality Gate / Manual Full Quality

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  full-quality:
    name: full quality (manual)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        run: python -m pip install uv==0.9.15

      - name: Sync dev dependencies
        run: uv sync --dev --frozen

      - name: Run tests
        run: uv run python -m pytest -q

      - name: Run ruff
        run: uv run ruff check .

      - name: Run ty
        run: uv run ty check .
