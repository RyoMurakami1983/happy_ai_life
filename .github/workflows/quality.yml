name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  # Uncomment this job if your repository has significant Markdown content.
  # Also add .textlintrc.json and package.json (see github-quality-gate-setup skill).
  #
  # textlint:
  #   name: textlint
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: '20'
  #         cache: 'npm'
  #
  #     - name: Install dependencies
  #       run: npm ci
  #
  #     - name: Run textlint
  #       run: npx textlint "**/*.md" --ignore-path .gitignore

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  happy-default:
    name: HappyDefault smoke
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        run: python -m pip install uv==0.9.15

      - name: Sync dev dependencies
        run: uv sync --dev --frozen

      - name: Run smoke tests
        run: uv run python -m pytest -q tests/test_app_smoke.py tests/test_plugin_manifest.py tests/test_secret_guard_minimal.py

      - name: Run ruff
        run: uv run ruff check .

  full-quality:
    name: full quality (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        run: python -m pip install uv==0.9.15

      - name: Sync dev dependencies
        run: uv sync --dev --frozen

      - name: Run tests
        run: uv run python -m pytest -q

      - name: Run ruff
        run: uv run ruff check .

      - name: Run ty
        run: uv run ty check .
